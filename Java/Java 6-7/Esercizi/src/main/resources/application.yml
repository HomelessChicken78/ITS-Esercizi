spring:
  application:
    name: catalogo-WR-Stream

  config:
    import: optional:configserver:http://localhost:8071

  profiles:
    active: dev

  cloud:
    stream:
      bindings:
        productProducer-out-0:
          destination: product-catalog
      kafka:
        binder:
          brokers: localhost:9092

# attiva l'end point dell'actuator per il refresh delle proprietà di configurazione
# lette dal server di configurazione
management:
  endpoints:
    web:
      exposure:
        include: refresh